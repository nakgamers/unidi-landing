<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unidi.net - Jasa Pembuatan Undangan Digital Elegan</title>

<meta name="description" content="Unidi.net menyediakan jasa pembuatan undangan digital pernikahan elegan dengan desain premium, RSVP tamu, backsound musik, amplop digital, dan link undangan personal untuk setiap tamu.">

<meta name="keywords" content="undangan digital, undangan pernikahan online, jasa undangan digital, wedding invitation website, undangan digital murah, undangan digital elegan">

<meta name="author" content="Unidi.net">

<meta name="robots" content="index, follow">

<link rel="canonical" href="https://unidi.net/">

<!-- Open Graph (Preview WhatsApp / Sosial Media) -->
<meta property="og:title" content="Unidi.net - Undangan Digital Elegan">
<meta property="og:description" content="Buat undangan pernikahan digital elegan dengan desain premium, RSVP tamu, musik, dan amplop digital.">
<meta property="og:image" content="https://unidi.net/preview.jpg">
<meta property="og:url" content="https://unidi.net">
<meta property="og:type" content="website">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Unidi.net - Undangan Digital Elegan">
<meta name="twitter:description" content="Jasa pembuatan undangan digital modern dengan fitur lengkap.">
<meta name="twitter:image" content="https://unidi.net/preview.jpg">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<!-- Babel -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">

<style>
body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fafaf9; }
.font-serif { font-family: 'Playfair Display', serif; }

/* Animasi Kustom */
@keyframes float {
0% { transform: translateY(0px); }
50% { transform: translateY(-10px); }
100% { transform: translateY(0px); }
}

.animate-float { animation: float 4s ease-in-out infinite; }

/* Hide scrollbar for iframe container */
.mockup-scroll::-webkit-scrollbar {
width: 0px;
background: transparent;
}
</style>

</head>
<body class="text-stone-800 antialiased overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [isScrolled, setIsScrolled] = useState(false);

            // Nomor WA Order
            const waNumber = "6285155154473";
            const waMessage = encodeURIComponent("Halo Admin unidi.net, saya tertarik untuk membuat undangan digital pernikahan. Boleh minta info paket harganya?");
            const waLink = `https://wa.me/${waNumber}?text=${waMessage}`;

            // Efek Navbar saat di-scroll
            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 20);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="min-h-screen">
                    
                    {/* NAVBAR */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-white/90 backdrop-blur-md shadow-sm py-4' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <a href="#" className="flex items-center gap-2">
                                <div className="w-8 h-8 rounded-lg bg-rose-500 flex items-center justify-center text-white">
                                    <i className="fa-solid fa-envelope-open-text"></i>
                                </div>
                                <span className="font-bold text-xl tracking-tight text-stone-900">unidi<span className="text-rose-500">.net</span></span>
                            </a>
                            
                            <div className="hidden md:flex gap-8 items-center font-medium text-stone-600">
                                <a href="#fitur" className="hover:text-rose-500 transition">Fitur</a>
                                <a href="#demo" className="hover:text-rose-500 transition">Katalog Demo</a>
                                <a href={waLink} target="_blank" className="bg-stone-900 text-white px-6 py-2.5 rounded-full hover:bg-rose-500 transition-colors shadow-lg hover:shadow-rose-500/30">
                                    Pesan Sekarang
                                </a>
                            </div>
                            
                            <a href={waLink} target="_blank" className="md:hidden text-2xl text-stone-900">
                                <i className="fa-brands fa-whatsapp text-emerald-500"></i>
                            </a>
                        </div>
                    </nav>

                    {/* HERO SECTION */}
                    <section className="relative pt-32 pb-20 md:pt-48 md:pb-32 px-6 overflow-hidden">
                        <div className="absolute top-0 right-0 -z-10 w-[600px] h-[600px] bg-rose-50 rounded-full blur-3xl opacity-50 translate-x-1/2 -translate-y-1/2"></div>
                        <div className="absolute bottom-0 left-0 -z-10 w-[500px] h-[500px] bg-amber-50 rounded-full blur-3xl opacity-50 -translate-x-1/2 translate-y-1/2"></div>
                        
                        <div className="max-w-4xl mx-auto text-center relative z-10">
                            <span className="inline-block py-1 px-3 rounded-full bg-rose-100 text-rose-600 text-sm font-semibold tracking-wide mb-6 border border-rose-200">
                                Solusi Undangan Era Digital
                            </span>
                            <h1 className="text-5xl md:text-7xl font-bold text-stone-900 mb-6 leading-tight tracking-tight">
                                Bagikan Momen Bahagia <br/><span className="font-serif italic font-normal text-rose-500">dengan Lebih Berkesan</span>
                            </h1>
                            <p className="text-lg md:text-xl text-stone-500 mb-10 max-w-2xl mx-auto leading-relaxed">
                                Buat undangan pernikahan digital impianmu di unidi.net. Desain eksklusif, fitur lengkap, dan proses cepat tanpa ribet.
                            </p>
                            
                            <div className="flex flex-col sm:flex-row gap-4 justify-center items-center">
                                <a href={waLink} target="_blank" className="w-full sm:w-auto bg-rose-500 text-white px-8 py-4 rounded-full font-semibold hover:bg-rose-600 transition-all shadow-xl shadow-rose-500/30 flex items-center justify-center gap-2 transform hover:-translate-y-1">
                                    <i className="fa-brands fa-whatsapp text-xl"></i> Konsultasi via WA
                                </a>
                                <a href="#demo" className="w-full sm:w-auto bg-white text-stone-700 px-8 py-4 rounded-full font-semibold hover:bg-stone-50 transition-all border border-stone-200 shadow-sm flex items-center justify-center gap-2">
                                    <i className="fa-solid fa-eye"></i> Lihat Demo
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* FITUR SECTION */}
                    <section id="fitur" className="py-20 bg-white px-6">
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center mb-16">
                                <h2 className="text-3xl md:text-4xl font-bold text-stone-900 mb-4">Fitur Premium untuk Momen Spesial</h2>
                                <p className="text-stone-500">Semua yang kamu butuhkan untuk undangan digital yang sempurna ada di sini.</p>
                            </div>
                            
                            <div className="grid md:grid-cols-3 gap-8">
                                {[
                                    { icon: "fa-mobile-screen", title: "Responsif & Elegan", desc: "Desain cantik yang menyesuaikan otomatis di layar HP maupun laptop tamu Anda." },
                                    { icon: "fa-music", title: "Backsound Musik", desc: "Tambahkan lagu favorit yang akan diputar otomatis saat undangan dibuka." },
                                    { icon: "fa-address-book", title: "RSVP & Guestbook", desc: "Tamu dapat mengonfirmasi kehadiran dan meninggalkan ucapan doa secara langsung." },
                                    { icon: "fa-map-location-dot", title: "Integrasi Maps", desc: "Arahkan tamu ke lokasi acara dengan tepat melalui tautan langsung ke Google Maps." },
                                    { icon: "fa-gift", title: "Amplop Digital", desc: "Fitur e-Wallet (DANA, Gopay) & Transfer Bank bagi tamu yang ingin mengirim tanda kasih." },
                                    { icon: "fa-link", title: "Link Kustom Tamu", desc: "Satu klik untuk membuat link undangan dengan nama masing-masing tamu." }
                                ].map((fitur, idx) => (
                                    <div key={idx} className="p-8 rounded-3xl bg-stone-50 border border-stone-100 hover:shadow-xl transition-shadow group">
                                        <div className="w-14 h-14 rounded-2xl bg-white shadow-sm border border-stone-100 flex items-center justify-center text-rose-500 text-2xl mb-6 group-hover:bg-rose-500 group-hover:text-white transition-colors">
                                            <i className={`fa-solid ${fitur.icon}`}></i>
                                        </div>
                                        <h3 className="text-xl font-bold text-stone-800 mb-3">{fitur.title}</h3>
                                        <p className="text-stone-500 leading-relaxed">{fitur.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* DEMO SHOWCASE SECTION DENGAN IFRAME */}
                    <section id="demo" className="py-24 bg-stone-900 px-6 relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-full h-full bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-stone-800 via-stone-900 to-stone-900 -z-10"></div>
                        
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center mb-16">
                                <span className="text-rose-500 font-semibold tracking-wider text-sm uppercase mb-2 block">Katalog Template</span>
                                <h2 className="text-3xl md:text-5xl font-bold text-white mb-6">Pilih Desain Impianmu</h2>
                                <p className="text-stone-400 max-w-2xl mx-auto">Coba langsung interaksi undangannya. Scroll, putar musik, dan rasakan pengalamannya dari sudut pandang tamu.</p>
                            </div>

                            <div className="grid lg:grid-cols-2 gap-16 items-center">
                                
                                {/* DEMO 1: Julia & Yusuf */}
                                <div className="flex flex-col items-center">
                                    <div className="mb-8 text-center">
                                        <h3 className="font-serif text-3xl text-white mb-2">Tema Floral Gold</h3>
                                        <p className="text-stone-400 text-sm">Elegan, Mewah, Animasi Bunga Jatuh</p>
                                    </div>
                                    
                                    {/* MOCKUP HP */}
                                    <div className="relative animate-float" style={{animationDelay: '0s'}}>
                                        {/* Frame HP */}
                                        <div className="relative z-10 w-[320px] h-[650px] bg-stone-950 rounded-[3rem] border-[8px] border-stone-800 shadow-2xl overflow-hidden ring-1 ring-white/10">
                                            {/* Notch/Poni HP */}
                                            <div className="absolute top-0 inset-x-0 h-6 bg-stone-800 w-40 mx-auto rounded-b-xl z-50"></div>
                                            
                                            {/* Iframe Website */}
                                            <iframe 
                                                src="https://nandz.my.id/invit.html" 
                                                className="w-full h-full border-none bg-white mockup-scroll"
                                                title="Demo Julia & Yusuf"
                                            ></iframe>
                                        </div>
                                        {/* Bayangan di bawah HP */}
                                        <div className="absolute -bottom-10 left-1/2 -translate-x-1/2 w-3/4 h-10 bg-black/40 blur-xl rounded-full -z-10"></div>
                                    </div>
                                </div>

                                {/* DEMO 2: Arif & Pari */}
                                <div className="flex flex-col items-center">
                                    <div className="mb-8 text-center">
                                        <h3 className="font-serif text-3xl text-white mb-2">Tema Modern Rustic</h3>
                                        <p className="text-stone-400 text-sm">Minimalis, Hangat, Clean Design</p>
                                    </div>
                                    
                                    {/* MOCKUP HP */}
                                    <div className="relative animate-float" style={{animationDelay: '2s'}}>
                                        <div className="relative z-10 w-[320px] h-[650px] bg-stone-950 rounded-[3rem] border-[8px] border-stone-800 shadow-2xl overflow-hidden ring-1 ring-white/10">
                                            <div className="absolute top-0 inset-x-0 h-6 bg-stone-800 w-40 mx-auto rounded-b-xl z-50"></div>
                                            
                                            <iframe 
                                                src="https://aripari.qzz.io/" 
                                                className="w-full h-full border-none bg-white mockup-scroll"
                                                title="Demo Arif & Pari"
                                            ></iframe>
                                        </div>
                                        <div className="absolute -bottom-10 left-1/2 -translate-x-1/2 w-3/4 h-10 bg-black/40 blur-xl rounded-full -z-10"></div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </section>

                    {/* CTA SECTION */}
                    <section className="py-24 bg-rose-50 px-6">
                        <div className="max-w-4xl mx-auto text-center bg-white p-12 rounded-[3rem] shadow-xl border border-rose-100 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-rose-500/10 rounded-full blur-2xl"></div>
                            <div className="absolute bottom-0 left-0 w-32 h-32 bg-amber-500/10 rounded-full blur-2xl"></div>
                            
                            <h2 className="font-serif text-4xl md:text-5xl text-stone-900 mb-6 relative z-10">Mulai Buat Undanganmu</h2>
                            <p className="text-stone-500 mb-10 max-w-xl mx-auto relative z-10">
                                Hubungi kami sekarang untuk mendiskusikan tema, data mempelai, dan paket yang sesuai dengan kebutuhan pernikahanmu.
                            </p>
                            <a href={waLink} target="_blank" className="inline-flex items-center justify-center gap-3 bg-emerald-500 text-white px-10 py-5 rounded-full font-bold text-lg hover:bg-emerald-600 transition-all shadow-xl shadow-emerald-500/30 transform hover:scale-105 relative z-10">
                                <i className="fa-brands fa-whatsapp text-2xl"></i> Pesan via WhatsApp
                            </a>
                            <p className="mt-6 text-sm text-stone-400 font-medium relative z-10">Admin Ramah & Fast Respon ⚡</p>
                        </div>
                    </section>

                    {/* FOOTER */}
                    <footer className="bg-stone-950 text-stone-400 py-12 px-6 border-t border-stone-900">
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-2">
                                <div className="w-6 h-6 rounded bg-rose-500 flex items-center justify-center text-white text-xs">
                                    <i className="fa-solid fa-envelope-open-text"></i>
                                </div>
                                <span className="font-bold text-lg text-white">unidi<span className="text-rose-500">.net</span></span>
                            </div>
                            
                            <p className="text-sm">© 2026 unidi.net. All rights reserved.</p>
                            
                            <div className="flex gap-4">
                                <a href="#" className="w-10 h-10 rounded-full bg-stone-900 flex items-center justify-center hover:bg-rose-500 hover:text-white transition-colors"><i className="fa-brands fa-instagram"></i></a>
                                <a href={waLink} className="w-10 h-10 rounded-full bg-stone-900 flex items-center justify-center hover:bg-emerald-500 hover:text-white transition-colors"><i className="fa-brands fa-whatsapp"></i></a>
                            </div>
                        </div>
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
